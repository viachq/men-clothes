name: Catalog Service Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/catalog-service/**'
      - '.github/workflows/catalog-service-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/catalog-service/**'
      - '.github/workflows/catalog-service-tests.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./services/catalog-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run linting (flake8)
      working-directory: ./services/catalog-service
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: lint
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./services/catalog-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests with pytest (if tests exist)
      working-directory: ./services/catalog-service
      env:
        PYTHONPATH: ${{ github.workspace }}/services/catalog-service
      run: |
        # Run tests if tests directory exists
        if [ -d "backend/tests" ]; then
          pip install pytest pytest-cov
          pytest backend/tests/ -v --cov=backend --cov-report=term-missing --cov-fail-under=70 || true
        else
          echo "No tests found. Skipping test execution."
        fi
      continue-on-error: true
