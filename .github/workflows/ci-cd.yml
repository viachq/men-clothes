name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/viachq/ippt-microservices

jobs:
  # 1. Lint - Check code quality for all services
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            type: python
            path: ./services/auth-service
          - name: catalog-service
            type: python
            path: ./services/catalog-service
          - name: order-service
            type: python
            path: ./services/order-service
          - name: client-frontend
            type: frontend
            path: ./client
          - name: admin-frontend
            type: frontend
            path: ./admin
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      if: matrix.service.type == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Lint Python service
      if: matrix.service.type == 'python'
      working-directory: ${{ matrix.service.path }}
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Set up Node.js
      if: matrix.service.type == 'frontend'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ${{ matrix.service.path }}/package-lock.json
    
    - name: Install npm dependencies (for linting)
      if: matrix.service.type == 'frontend'
      working-directory: ${{ matrix.service.path }}
      run: npm ci
    
    - name: Lint Frontend service
      if: matrix.service.type == 'frontend'
      working-directory: ${{ matrix.service.path }}
      run: npm run lint || true
      continue-on-error: true

  # 2. Tests - Run unit tests for Python services
  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            path: ./services/auth-service
          - name: catalog-service
            path: ./services/catalog-service
          - name: order-service
            path: ./services/order-service
        python-version: ['3.11', '3.12', '3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ${{ matrix.service.path }}
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install test dependencies
      working-directory: ${{ matrix.service.path }}
      run: |
        pip install pytest pytest-cov
    
    - name: Run tests with pytest
      working-directory: ${{ matrix.service.path }}
      env:
        PYTHONPATH: ${{ github.workspace }}/${{ matrix.service.path }}
        JWT_SECRET_KEY: test-secret-key-for-ci
      run: |
        # Order-service has lower coverage requirement (60%) due to complex code paths
        if [ "${{ matrix.service.name }}" == "order-service" ]; then
          COV_THRESHOLD=60
        else
          COV_THRESHOLD=70
        fi
        pytest backend/tests/ -v \
          --cov=backend \
          --cov-report=term-missing \
          --cov-report=xml \
          --cov-report=html \
          --cov-fail-under=$COV_THRESHOLD || exit 1
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./${{ matrix.service.path }}/coverage.xml
        flags: ${{ matrix.service.name }}
        name: ${{ matrix.service.name }}-coverage-py${{ matrix.python-version }}
      continue-on-error: true
    
    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-${{ matrix.service.name }}-py${{ matrix.python-version }}
        path: ${{ matrix.service.path }}/htmlcov
      continue-on-error: true

  # 3. Build Docker Images - Build images for all services
  # 4. Push to Registry - Push images to GitHub Container Registry
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service:
          - name: auth-service
            context: ./services/auth-service
            dockerfile: ./services/auth-service/Dockerfile
          - name: catalog-service
            context: ./services/catalog-service
            dockerfile: ./services/catalog-service/Dockerfile
          - name: order-service
            context: ./services/order-service
            dockerfile: ./services/order-service/Dockerfile
          - name: client-frontend
            context: ./client
            dockerfile: ./client/Dockerfile
          - name: admin-frontend
            context: ./admin
            dockerfile: ./admin/Dockerfile
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.context }}
        file: ${{ matrix.service.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 5. Deploy to Kubernetes (only on main branch, requires cluster access)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Deployment Status
      run: |
        echo "## 🚀 Kubernetes Deployment Status" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ secrets.KUBECONFIG }}" != "" ]; then
          echo "✅ **KUBECONFIG secret configured**" >> $GITHUB_STEP_SUMMARY
          echo "Deployment will proceed automatically." >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ **KUBECONFIG secret not configured**" >> $GITHUB_STEP_SUMMARY
          echo "Deployment step will be skipped." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To enable auto-deployment:" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to Settings → Secrets and variables → Actions" >> $GITHUB_STEP_SUMMARY
          echo "2. Add new repository secret named \`KUBECONFIG\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Value: base64-encoded kubeconfig file" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [docs/KUBERNETES_SETUP.md](docs/KUBERNETES_SETUP.md) for details." >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Check KUBECONFIG secret
      id: check-kubeconfig
      run: |
        if [ "${{ secrets.KUBECONFIG }}" != "" ]; then
          echo "kubectl_configured=true" >> $GITHUB_OUTPUT
          echo "✅ KUBECONFIG secret found"
        else
          echo "kubectl_configured=false" >> $GITHUB_OUTPUT
          echo "⚠️ KUBECONFIG secret not found. Skipping Kubernetes deployment."
          echo "To enable auto-deployment, add KUBECONFIG secret in repository settings:"
          echo "  Settings → Secrets and variables → Actions → New repository secret"
          echo "  Name: KUBECONFIG"
          echo "  Value: base64-encoded kubeconfig file"
        fi
    
    - name: Configure kubectl
      id: kubectl-config
      if: steps.check-kubeconfig.outputs.kubectl_configured == 'true'
      run: |
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        echo "🔧 Configured kubectl:"
        kubectl config view --minify || (echo "❌ Failed to configure kubectl. Check KUBECONFIG secret." && exit 1)
        kubectl cluster-info || (echo "❌ Failed to connect to cluster. Check KUBECONFIG secret." && exit 1)
      continue-on-error: true
    
    - name: Update image tags in deployment files
      if: steps.check-kubeconfig.outputs.kubectl_configured == 'true'
      run: |
        IMAGE_TAG="${{ github.sha }}"
        IMAGE_PREFIX="${{ env.IMAGE_PREFIX }}"
        
        echo "📝 Updating image tags to $IMAGE_TAG"
        
        # Update backend services
        sed -i "s|image:.*auth-service.*|image: ${IMAGE_PREFIX}-auth-service:${IMAGE_TAG}|g" k8s/auth-service/deployment.yaml
        sed -i "s|image:.*catalog-service.*|image: ${IMAGE_PREFIX}-catalog-service:${IMAGE_TAG}|g" k8s/catalog-service/deployment.yaml
        sed -i "s|image:.*order-service.*|image: ${IMAGE_PREFIX}-order-service:${IMAGE_TAG}|g" k8s/order-service/deployment.yaml
        
        # Update frontend services
        sed -i "s|image:.*client-frontend.*|image: ${IMAGE_PREFIX}-client-frontend:${IMAGE_TAG}|g" k8s/client-frontend/deployment.yaml
        sed -i "s|image:.*admin-frontend.*|image: ${IMAGE_PREFIX}-admin-frontend:${IMAGE_TAG}|g" k8s/admin-frontend/deployment.yaml
        
        echo "✅ Image tags updated"
        echo ""
        echo "Updated images:"
        grep -h "image:" k8s/*/deployment.yaml | sort | uniq
    
    - name: Deploy to Kubernetes
      if: steps.check-kubeconfig.outputs.kubectl_configured == 'true' && steps.kubectl-config.outcome == 'success'
      run: |
        echo "🚀 Deploying to Kubernetes..."
        
        # Apply namespace
        kubectl apply -f k8s/namespace.yaml
        
        # Apply ConfigMap and Secret
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/secret.yaml
        
        # Deploy backend services
        echo "📦 Deploying backend services..."
        kubectl apply -f k8s/auth-service/
        kubectl apply -f k8s/catalog-service/
        kubectl apply -f k8s/order-service/
        
        # Deploy frontend services
        echo "🎨 Deploying frontend services..."
        kubectl apply -f k8s/client-frontend/
        kubectl apply -f k8s/admin-frontend/
        
        # Apply Ingress if exists
        if [ -f k8s/ingress.yaml ]; then
          echo "🌐 Applying Ingress..."
          kubectl apply -f k8s/ingress.yaml
        fi
        
        # Wait for deployments to be ready
        echo "⏳ Waiting for deployments to be ready..."
        kubectl wait --for=condition=available --timeout=300s deployment/auth-service -n food-delivery || true
        kubectl wait --for=condition=available --timeout=300s deployment/catalog-service -n food-delivery || true
        kubectl wait --for=condition=available --timeout=300s deployment/order-service -n food-delivery || true
        
        # Show deployment status
        echo ""
        echo "✅ Deployment complete!"
        echo ""
        echo "📊 Deployment Status:"
        kubectl get deployments -n food-delivery
        echo ""
        echo "📦 Pods Status:"
        kubectl get pods -n food-delivery
        echo ""
        echo "🔗 Services:"
        kubectl get svc -n food-delivery
