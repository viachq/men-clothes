name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/viachq/ippt-microservices

jobs:
  # Build and push Docker images for all services
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service:
          - name: auth-service
            context: ./services/auth-service
            dockerfile: ./services/auth-service/Dockerfile
          - name: catalog-service
            context: ./services/catalog-service
            dockerfile: ./services/catalog-service/Dockerfile
          - name: order-service
            context: ./services/order-service
            dockerfile: ./services/order-service/Dockerfile
          - name: client-frontend
            context: ./client
            dockerfile: ./client/Dockerfile
          - name: admin-frontend
            context: ./admin
            dockerfile: ./admin/Dockerfile
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.context }}
        file: ${{ matrix.service.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deploy to Kubernetes (optional - requires cluster access)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Configure kubectl (if cluster access available)
      # This step requires KUBECONFIG secret or cluster credentials
      # Uncomment and configure if you have Kubernetes cluster access
      # run: |
      #   echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
      #   export KUBECONFIG=kubeconfig
      continue-on-error: true
    
    - name: Update image tags in deployment files
      run: |
        # Update image tags to use registry images
        # This is a placeholder - actual deployment would update k8s manifests
        echo "Deployment step - update image tags in k8s/*/deployment.yaml"
        echo "Image: ${{ env.IMAGE_PREFIX }}-auth-service:${{ github.sha }}"
      continue-on-error: true
    
    - name: Deploy to Kubernetes
      # Uncomment if you have cluster access
      # run: |
      #   kubectl apply -f k8s/namespace.yaml
      #   kubectl apply -f k8s/configmap.yaml
      #   kubectl apply -f k8s/secret.yaml
      #   kubectl apply -f k8s/auth-service/
      #   kubectl apply -f k8s/catalog-service/
      #   kubectl apply -f k8s/order-service/
      #   kubectl apply -f k8s/client-frontend/
      #   kubectl apply -f k8s/admin-frontend/
      continue-on-error: true
