name: Order Service Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/order-service/**'
      - '.github/workflows/order-service-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/order-service/**'
      - '.github/workflows/order-service-tests.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./services/order-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run linting (flake8)
      working-directory: ./services/order-service
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: lint
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./services/order-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install test dependencies
      working-directory: ./services/order-service
      run: |
        pip install pytest pytest-cov
    
    - name: Run tests with pytest
      working-directory: ./services/order-service
      env:
        PYTHONPATH: ${{ github.workspace }}/services/order-service
      run: |
        pytest backend/tests/ -v \
          --cov=backend \
          --cov-report=term-missing \
          --cov-report=xml \
          --cov-report=html \
          --cov-fail-under=70
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./services/order-service/coverage.xml
        flags: order-service
        name: order-service-coverage
      continue-on-error: true
    
    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-order-py${{ matrix.python-version }}
        path: ./services/order-service/htmlcov
      continue-on-error: true
