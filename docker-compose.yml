services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mens-clothes-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/shop.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-ippt-project-dev-secret-key-fixed-for-local-development-2024}
    volumes:
      - db-data:/app/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mens-clothes-client
    ports:
      - "5174:5174"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: mens-clothes-admin
    ports:
      - "5173:5173"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
