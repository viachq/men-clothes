[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (with database)
    slow: Slow running tests
env =
    PYTHONPATH = .

